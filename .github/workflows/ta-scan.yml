name: TA Monitor - Daily Scan

on:
  schedule:
    - cron: '0 6 * * *'  # 07:00 CET
  workflow_dispatch:
    inputs:
      profile:
        description: 'Profilo da eseguire (ID o "all" per tutti auto_scan)'
        required: false
        default: 'all'
      hours_old:
        description: 'Ore di anzianità massima annunci'
        required: false
        default: '168'

permissions:
  contents: write

jobs:
  scrape:
    runs-on: ubuntu-latest
    steps:
      - name: 📥 Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: 🐍 Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: 📦 Installa dipendenze
        run: pip install -r requirements.txt

      - name: 🔍 Esegui scraping
        env:
          PROFILE: ${{ github.event.inputs.profile || 'all' }}
          HOURS_OLD: ${{ github.event.inputs.hours_old || '168' }}
        run: |
          python ta_monitor.py \
            --profile "$PROFILE" \
            --hours-old "$HOURS_OLD"

      - name: 🧠 ML Insights
        env:
          PROFILE: ${{ github.event.inputs.profile || 'all' }}
        run: |
          python ml_insights.py --profile "$PROFILE"

      - name: 📊 Upload report
        uses: actions/upload-artifact@v4
        with:
          name: ta-report-${{ github.run_number }}
          path: |
            output/**/*.xlsx
            output/**/*.csv
            output/**/*.json
            output/*.xlsx
            output/*.csv
            output/*.json
          retention-days: 90

      - name: 💾 Committa risultati
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "TA Monitor Bot"
          git add output/ data/
          if git diff --staged --quiet; then
            echo "Nessun nuovo risultato"
          else
            DATE=$(date -u +"%Y-%m-%d %H:%M UTC")
            PROFILE="${{ github.event.inputs.profile || 'all' }}"
            git commit -m "📋 TA Scan ${DATE} — profilo: ${PROFILE}"
            git push
          fi

      - name: 📧 Invio email personalizzate
        if: vars.ENABLE_EMAIL == 'true'
        env:
          SMTP_HOST: ${{ secrets.SMTP_HOST }}
          SMTP_PORT: ${{ secrets.SMTP_PORT }}
          SMTP_USER: ${{ secrets.SMTP_USER }}
          SMTP_PASSWORD: ${{ secrets.SMTP_PASSWORD }}
        run: python send_reports.py